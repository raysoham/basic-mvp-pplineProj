name: CI - basic-mvp-pplineproj

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-test-lint:
    # This job will run on the latest available Ubuntu runner provided by GitHub Actions.
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checks out your repository under $GITHUB_WORKSPACE, so that workflow can access the code.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Sets up a Node.js 20 environment for the rest of the workflow,
      # and configures npm caching for faster installs on subsequent runs.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      - name: npm install primary
        run: npm install
      # Step 3: Installs project dependencies using npm ci, which is a clean install
      # method ensuring dependencies exactly match the package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Step 4: Runs the linting process as defined in package.json scripts with `npm run lint`,
      # which helps catch style and code quality issues before proceeding.
      - name: Lint
        run: npm run lint

      # Step 5: Executes the project's test suite with `npm test`,
      # running all unit/integration tests configured in your repository.
      - name: Test
        run: npm test

  security-scans:
    runs-on: ubuntu-latest
    needs: build-test-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and above)
        run: npm audit --audit-level=high

  docker-build-scan:
    runs-on: ubuntu-latest
    needs: security-scans
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t basic-mvp-pplineproj:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: basic-mvp-pplineproj:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

  publish-image:
    runs-on: ubuntu-latest
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/raysoham/basic-mvp-pplineproj" >> "$GITHUB_OUTPUT"

      - name: Build image for publish
        run: docker build -t ${{ steps.image.outputs.name }}:${{ github.sha }} -t ${{ steps.image.outputs.name }}:latest .

      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:latest

